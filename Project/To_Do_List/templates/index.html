<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的待办清单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .add-form input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .add-form button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .add-form button:hover {
            background-color: #218838;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-name {
            flex: 1;
        }
        .done {
            text-decoration: line-through;
            color: #888;
        }
        .status {
            font-size: 20px;
        }
        .btn-done {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <h1>📝 我的待办清单</h1>

    <form class="add-form" action="/add" method="POST">
        <input type="text" name="task_name" placeholder="输入新任务..." required>
        <button type="submit">添加</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <span class="status">
                        {% if task.done %}✅{% else %}⭕{% endif %}
                    </span>
                    <span class="task-name {% if task.done %}done{% endif %}">
                        {{ task.name }}
                    </span>
                    {% if not task.done %}
                        <a href="/done/{{ loop.index0 }}" class="btn-done">完成</a>
                    {% endif %}
                    <a href="/delete/{{ loop.index0 }}" class="btn-delete" onclick="return confirm('确定删除吗？')">删除</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <div class="empty">
            🎉 暂无任务，添加一个吧！
        </div>
    {% endif %}
</body>
</html>
